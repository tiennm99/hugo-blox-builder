# Home page configuration using data-driven approach (data/pages/home.yaml)
title: Home
type: landing
date: 2023-11-01

sections:
  - block: hero
    content:
      title: "**Build Anything** with Hugo Blox"
      text: |
        Create stunning websites with our Preact-powered components.
        Fast, flexible, and future-proof.
      announcement:
        text: "🎉 Introducing Preact Components"
        link:
          text: "Learn more"
          url: "/linked"
      primary_action:
        text: "Get Started"
        url: "#features"
        icon: "hero/arrow-right"
      secondary_action:
        text: "View Documentation"
        url: "/linked"
    design:
      css_class: "hero-gradient"
      background:
        gradient:
          start: "primary-600"
          end: "primary-400"
          direction: "135"

  - block: features
    id: features
    content:
      title: "Why Choose Hugo Blox?"
      items:
        - name: "Lightning Fast"
          description: "Static site generation with Preact hydration"
          icon: "bolt"
        - name: "Type Safe"
          description: "Full TypeScript support for all components"
          icon: "shield-check"
        - name: "SEO Optimized"
          description: "Server-side rendering with progressive enhancement"
          icon: "magnifying-glass"
    design:
      columns: "3"

  - block: map
    content:
      title: "Visit the Lab"
      subtitle: "We're based on the Stanford campus — drop in any time during office hours."
      location:
        address: |
          353 Jane Stanford Way
          Stanford, CA 94305
          United States
        lat: 37.4275
        lng: -122.1697
      zoom: 15
      cta:
        directions:
          text: "Get directions"
        phone: "+1-650-555-0142"
        email: "hello@example.com"
    design:
      layout: side-by-side
      height: md
      style: streets

  - block: map
    content:
      title: "Where to find us"
      markers:
        - lat: 37.4275
          lng: -122.1697
          title: "Stanford AI Lab"
          description: "Main campus building"
        - lat: 37.4419
          lng: -122.1430
          title: "Palo Alto Office"
          description: "Downtown Palo Alto"
        - lat: 37.7749
          lng: -122.4194
          title: "San Francisco HQ"
          description: "Mission District"
    design:
      layout: map-only
      height: lg
      style: light

  - block: cta-card
    content:
      title: "Ready to get started?"
      text: "Join 250,000+ users building with Hugo Blox"
      button:
        text: "Start Building"
        url: "https://hugoblox.com"
    design:
      background:
        color:
          light: "gray-50"
          dark: "gray-900"
